<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TruthLens AI</title>
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #1e1e2e;
      color: #cdd6f4;
    }
    .container { display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 20px; margin: 0; color: #cba6f7; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: -0.02em; }
    .status { font-size: 11px; color: #7f849c; font-weight: 500; }
    .btn {
      background-color: #cba6f7;
      color: #11111b;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      box-shadow: 0 4px 14px 0 rgba(203, 166, 247, 0.3);
    }
    .btn:hover { background-color: #b4befe; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    
    #result {
      background: #181825;
      padding: 16px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
    }
    .section-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #585b70;
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .section-label:first-child { margin-top: 0; }
    
    .emotion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .emo-label { font-size: 10px; color: #9399b2; font-weight: 600; display: flex; justify-content: space-between; margin-bottom: 4px; }
    .emo-bar {
      height: 4px;
      background: #313244;
      border-radius: 2px;
      overflow: hidden;
    }
    .emo-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .context-list {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 11px;
      color: #bac2de;
    }
    .context-list li {
      margin-bottom: 6px;
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }
    .context-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 4px;
      height: 4px;
      background: #cba6f7;
      border-radius: 50%;
      box-shadow: 0 0 8px #cba6f7;
    }

    .rewrite-box {
      background: rgba(203, 166, 247, 0.05);
      border: 1px solid rgba(203, 166, 247, 0.1);
      padding: 12px;
      border-radius: 12px;
      font-style: italic;
      color: #cdd6f4;
      font-size: 12px;
      line-height: 1.5;
    }
    .score-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 10px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .high { background: rgba(243, 139, 168, 0.2); color: #f38ba8; }
    .med { background: rgba(250, 179, 135, 0.2); color: #fab387; }
    .low { background: rgba(166, 227, 161, 0.2); color: #a6e3a1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TruthLens AI</h1>
    <div class="status" id="status">Select text on page and click analyze.</div>
    <div id="loading" class="loader"></div>
    <button id="analyze-btn" class="btn">Analyze Selection</button>
    
    <div id="history-container" style="display: none; margin-top: 16px; border-top: 1px solid #313244; padding-top: 12px;">
      <div class="section-label">Recent Analyses (Local)</div>
      <div id="history-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div id="result">

      <div id="score-val" class="score-badge"></div>
      
      <div class="section-label">Bias Vector</div>
      <div id="bias-val" style="font-weight: 800; color: #cdd6f4;"></div>
      <div id="summary-val" style="font-size: 11px; color: #9399b2; margin-top: 4px; font-style: italic;"></div>

      <div class="section-label">Sentiment Resonance</div>
      <div class="emotion-grid">
        <div>
          <div class="emo-label">Fear <span id="fear-pct">0%</span></div>
          <div class="emo-bar"><div id="fear-fill" class="emo-fill" style="background: #cba6f7;"></div></div>
        </div>
        <div>
          <div class="emo-label">Anger <span id="anger-pct">0%</span></div>
          <div class="emo-bar"><div id="anger-fill" class="emo-fill" style="background: #f38ba8;"></div></div>
        </div>
        <div>
          <div class="emo-label">Hope <span id="hope-pct">0%</span></div>
          <div class="emo-bar"><div id="hope-fill" class="emo-fill" style="background: #a6e3a1;"></div></div>
        </div>
        <div>
          <div class="emo-label">Sadness <span id="sadness-pct">0%</span></div>
          <div class="emo-bar"><div id="sadness-fill" class="emo-fill" style="background: #89b4fa;"></div></div>
        </div>
      </div>

      <div class="section-label">Missing Perspectives</div>
      <ul id="context-list" class="context-list"></ul>

      <div class="section-label">Objective Reconstruction</div>
      <div id="rewrite-val" class="rewrite-box"></div>

      <a href="http://localhost:3000" target="_blank" id="dashboard-link" style="display: block; margin-top: 20px; color: #cba6f7; font-size: 10px; text-decoration: none; text-align: center; font-weight: 900; opacity: 0.8; letter-spacing: 0.2em;">TRUTHLENS OS // DASHBOARD →</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
